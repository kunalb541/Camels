name: Build Paper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install numpy matplotlib scipy

      - name: Regenerate figures from cached data
        run: python make_figures.py

      - name: Install LaTeX (TL2023 scheme-small + required packages)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended texlive-bibtex-extra bibtex2html latexmk
          # Install AASTeX 7.0.1 (not in Ubuntu texlive repo — install via CTAN)
          mkdir -p $HOME/texmf/tex/latex/aastex
          curl -sL https://mirrors.ctan.org/macros/latex/contrib/aastex/aastex701.cls \
               -o $HOME/texmf/tex/latex/aastex/aastex701.cls
          texhash $HOME/texmf

      - name: Compile paper (pdflatex + bibtex + 2× pdflatex)
        run: |
          pdflatex -interaction=nonstopmode paper.tex
          bibtex paper
          pdflatex -interaction=nonstopmode paper.tex
          pdflatex -interaction=nonstopmode paper.tex

      - name: Check for fatal errors
        run: |
          if grep -q "^!" paper.log; then
            echo "LaTeX fatal errors found:"
            grep -A2 "^!" paper.log | head -30
            exit 1
          fi
          echo "Compile clean."
          pdfinfo paper.pdf | grep Pages

      - name: Upload compiled paper
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper.pdf
          retention-days: 30
